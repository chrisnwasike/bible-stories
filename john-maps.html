<style>
    /* ── Map Page ── Integrated with project design system ── */

    #map {
        height: 80vh;
        border-radius: var(--radius);
        box-shadow: 0 4px 20px var(--shadow-deep);
    }

    .map-sidebar {
        max-height: 80vh;
        overflow-y: auto;
    }

    /* Cards — parchment theme */
    .card {
        border-color: var(--parchment-dark);
        background: var(--parchment-light);
    }

    .card-header {
        background: var(--parchment) !important;
        border-bottom-color: var(--parchment-dark);
        font-family: var(--font-heading);
        font-size: 13px;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: var(--ink);
    }

    .card-footer {
        background: var(--parchment) !important;
        border-top-color: var(--parchment-dark);
    }

    /* List items */
    .list-group-item {
        background: var(--parchment-light);
        border-color: var(--parchment-dark);
        cursor: pointer;
        transition: background 0.2s, transform 0.15s, color 0.2s;
        font-family: var(--font-body);
        font-size: 16px;
        color: var(--ink);
    }

    .list-group-item:hover {
        background: white;
        transform: translateX(3px);
        color: var(--gold);
    }

    /* Place badge */
    .badge.bg-primary {
        background-color: var(--gold) !important;
        font-family: var(--font-heading);
        font-size: 10px;
        letter-spacing: 1px;
        color: white;
    }

    /* Reset button */
    .btn-map-reset {
        display: block;
        width: 100%;
        padding: 10px;
        background: transparent;
        border: 1px solid var(--gold);
        color: var(--gold);
        font-family: var(--font-heading);
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: var(--radius);
        transition: background 0.2s, color 0.2s;
    }

    .btn-map-reset:hover {
        background: var(--gold);
        color: white;
    }

    /* Popup content */
    .leaflet-popup-content h5 {
        font-family: var(--font-heading);
        font-size: 14px;
        letter-spacing: 0.5px;
        color: var(--gold);
        margin-bottom: 8px;
    }

    .leaflet-popup-content p {
        font-family: var(--font-body);
        font-size: 15px;
        line-height: 1.6;
        color: var(--ink);
        margin: 0;
    }

    .map-hint {
        font-family: var(--font-body);
        font-size: 14px;
        color: var(--ink-faint);
        font-style: italic;
        margin-top: 10px;
        margin-bottom: 0;
        text-align: center;
    }

    /* Leaflet layer control — integrate with project fonts */
    .leaflet-control-layers-list label {
        font-family: var(--font-body);
        font-size: 14px;
        color: var(--ink);
    }
</style>

<div class="container-fluid py-3">
    <div class="row g-3">

        <!-- Sidebar -->
        <div class="col-lg-3">
            <div class="card shadow-sm h-100">
                <div class="card-header">
                    Key Places &amp; Events
                </div>
                <div class="card-body p-0 map-sidebar">
                    <div class="list-group list-group-flush" id="places-list"></div>
                </div>
                <div class="card-footer">
                    <button class="btn-map-reset" onclick="resetMap()">Reset Map</button>
                    <p class="map-hint">Click a place to zoom &amp; view details.</p>
                </div>
            </div>
        </div>

        <!-- Map -->
        <div class="col-lg-9">

        </div>

    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ── DATA: PLACES JESUS VISITED IN JOHN ──
    const places = [
        {
            name: "Bethany Beyond the Jordan",
            lat: 31.837, lng: 35.550,
            desc: `<h5>Bethany Beyond the Jordan (John 1:19–51)</h5>
                   <p>John the Baptist testifies about Jesus. First disciples — Andrew, Peter, Philip, Nathanael — follow Him here.</p>`
        },
        {
            name: "Cana of Galilee",
            lat: 32.750, lng: 35.340,
            desc: `<h5>Cana of Galilee (John 2:1–11; 4:46–54)</h5>
                   <p>First miracle: water turned to wine at a wedding. Jesus later heals a nobleman's son from a distance.</p>`
        },
        {
            name: "Capernaum",
            lat: 32.881, lng: 35.579,
            desc: `<h5>Capernaum (John 2:12; 4:46; 6:16–71)</h5>
                   <p>Jesus' ministry base in Galilee. He teaches in the synagogue and delivers the "Bread of Life" discourse.</p>`
        },
        {
            name: "Sea of Galilee (Tiberias)",
            lat: 32.820, lng: 35.590,
            desc: `<h5>Sea of Galilee (John 6:1–21; 21:1–25)</h5>
                   <p>Feeding of the 5,000. Jesus walks on water. Post-resurrection appearance: "Feed my sheep."</p>`
        },
        {
            name: "Sychar / Jacob's Well",
            lat: 32.207, lng: 35.274,
            desc: `<h5>Sychar, Samaria (John 4:1–42)</h5>
                   <p>Jesus meets the Samaritan woman, reveals He is the Messiah. Many Samaritans believe in Him.</p>`
        },
        {
            name: "Jerusalem",
            lat: 31.778, lng: 35.236,
            desc: `<h5>Jerusalem — Multiple Visits (John 2, 3, 5, 7–10, 12–20)</h5>
                   <p>Temple cleansing · Nicodemus · Feast of Tabernacles · Triumphal Entry · Last Supper · Crucifixion · Resurrection.</p>`
        },
        {
            name: "Pool of Bethesda",
            lat: 31.782, lng: 35.238,
            desc: `<h5>Pool of Bethesda (John 5:1–15)</h5>
                   <p>Jesus heals a man paralyzed for 38 years on the Sabbath, provoking opposition from the religious leaders.</p>`
        },
        {
            name: "Pool of Siloam",
            lat: 31.773, lng: 35.234,
            desc: `<h5>Pool of Siloam (John 9:1–12)</h5>
                   <p>Jesus heals a man born blind, commanding him to wash here — a sign of spiritual sight given by the Light of the world.</p>`
        },
        {
            name: "Bethany (near Jerusalem)",
            lat: 31.772, lng: 35.265,
            desc: `<h5>Bethany (John 11–12)</h5>
                   <p>Jesus raises Lazarus from the dead. Mary anoints Jesus. Starting point of the Triumphal Entry into Jerusalem.</p>`
        },
        {
            name: "Ephraim",
            lat: 32.020, lng: 35.300,
            desc: `<h5>Ephraim (John 11:54)</h5>
                   <p>After raising Lazarus, Jesus withdraws here with His disciples to escape the Sanhedrin's plot against Him.</p>`
        }
    ];

    // ── JOURNEY ROUTES ──
    const journeys = {
        "John 4 — Through Samaria": [
            [31.778, 35.236],   // Jerusalem
            [32.207, 35.274],   // Sychar
            [32.750, 35.340]    // Cana
        ],
        "Galilee → Jerusalem (John 5)": [
            [32.881, 35.579],   // Capernaum
            [31.778, 35.236]    // Jerusalem
        ],
        "Final Journey to Bethany / Ephraim (John 11)": [
            [31.778, 35.236],   // Jerusalem
            [31.772, 35.265],   // Bethany
            [32.020, 35.300]    // Ephraim
        ],
        "Resurrection Return to Galilee (John 21)": [
            [31.778, 35.236],   // Jerusalem
            [32.820, 35.590]    // Sea of Galilee
        ]
    };

    // ── INITIALIZE MAP ──
    const map = L.map('map').setView([31.95, 35.25], 8);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors · Biblical routes are approximate',
        maxZoom: 18
    }).addTo(map);

    // Markers
    const markerGroup = L.layerGroup().addTo(map);
    const markersByName = {};

    places.forEach(place => {
        const marker = L.marker([place.lat, place.lng], { riseOnHover: true })
            .bindPopup(place.desc, { maxWidth: 300 })
            .addTo(markerGroup);
        markersByName[place.name] = marker;
    });

    // Journey polylines — gold to match project palette
    const journeyLayers = {};
    Object.keys(journeys).forEach(name => {
        const poly = L.polyline(journeys[name], {
            color: '#b8953f',
            weight: 4,
            opacity: 0.85,
            lineJoin: 'round'
        }).bindTooltip(name, { permanent: false, direction: 'center' });
        journeyLayers[name] = poly;
        poly.addTo(map);
    });

    // Layer toggle control
    L.control.layers(null, {
        "All Places": markerGroup,
        ...journeyLayers
    }, { collapsed: false, position: 'topright' }).addTo(map);

    // ── SIDEBAR ──
    const listContainer = document.getElementById('places-list');
    places.forEach(place => {
        const item = document.createElement('a');
        item.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center';
        item.innerHTML = `
            <span><strong>${place.name}</strong></span>
            <span class="badge bg-primary rounded-pill">Jn</span>
        `;
        item.dataset.lat  = place.lat;
        item.dataset.lng  = place.lng;
        item.dataset.name = place.name;

        item.addEventListener('click', function () {
            const lat = parseFloat(this.dataset.lat);
            const lng = parseFloat(this.dataset.lng);
            map.flyTo([lat, lng], 13, { duration: 1.5 });
            setTimeout(() => markersByName[this.dataset.name].openPopup(), 1600);
        });

        listContainer.appendChild(item);
    });

    // ── HELPERS ──
    function resetMap() {
        map.flyTo([31.95, 35.25], 8, { duration: 1.5 });
    }

    // Press R to reset
    document.addEventListener('keydown', e => {
        if (e.key.toLowerCase() === 'r') resetMap();
    });
</script>
